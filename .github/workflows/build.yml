name: Build and Test

on:
  push:
    branches: [ main, master, 'feature/*', 'fix/*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-maven:
    name: Maven Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17', '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      
      - name: Build VibeTags Library (Maven)
        run: |
          cd vibetags
          mvn clean install -B
      
      - name: Reset AI Config Files (Maven)
        run: |
          cd example
          bash reset-ai-files.sh

      - name: Build Example Project (Maven)
        run: |
          cd example
          mvn clean compile -B -Dvibetags.log.path=../vibetags.log

      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          mvn test -B
      
      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          mvn test -Drun.integration.tests=true -B
      
      - name: Verify Generated AI Config Files
        run: |
          cd example
          echo "Checking generated files exist and contain content..."
          check() {
            local f="$1"
            test -f "$f" || (echo "âœ— $f missing" && exit 1)
            test -s "$f" || (echo "âœ— $f is empty (processor did not write content)" && exit 1)
            echo "âœ“ $f exists and has content"
          }
          check .cursorrules
          check CLAUDE.md
          check .aiexclude
          check AGENTS.md
          check QWEN.md
          check gemini_instructions.md
          check .github/copilot-instructions.md
          check llms.txt
          check llms-full.txt
          check .codex/config.toml
          check .codex/rules/vibetags.rules
          check CONVENTIONS.md
          check .aiderignore
          check .cursor/rules/com-example-payment-PaymentProcessor.mdc
          check .cursor/rules/com-example-database-DatabaseConnector.mdc
          check .trae/rules/com-example-payment-PaymentProcessor.md
          check .roo/rules/com-example-payment-PaymentProcessor.md
          echo "All generated files present and non-empty âœ“"

      - name: Verify @AIAudit Content
        run: |
          cd example
          echo "Checking @AIAudit content in generated files..."
          grep -q "MANDATORY SECURITY AUDITS" .cursorrules && echo "âœ“ Cursor audit section exists" || (echo "âœ— Cursor audit section missing" && exit 1)
          grep -q "audit_requirements" CLAUDE.md && echo "âœ“ Claude audit requirements exist" || (echo "âœ— Claude audit requirements missing" && exit 1)
          grep -q "CONTINUOUS AUDIT REQUIREMENTS" gemini_instructions.md && echo "âœ“ Gemini audit requirements exist" || (echo "âœ— Gemini audit requirements missing" && exit 1)
          grep -q "MANDATORY SECURITY AUDITS" AGENTS.md && echo "âœ“ Codex audit guardrails exist" || (echo "âœ— Codex audit guardrails missing" && exit 1)
          grep -q "MANDATORY SECURITY AUDITS" QWEN.md && echo "âœ“ Qwen audit guardrails exist" || (echo "âœ— Qwen audit guardrails missing" && exit 1)
          grep -q "Security Audit Requirements" .github/copilot-instructions.md && echo "âœ“ Copilot audit requirements exist" || (echo "âœ— Copilot audit requirements missing" && exit 1)
          grep -q "Security Audit Requirements" llms.txt && echo "âœ“ llms.txt audit section exists" || (echo "âœ— llms.txt audit section missing" && exit 1)
          grep -q "Mandatory Security Audit Requirements" llms-full.txt && echo "âœ“ llms-full.txt audit section exists" || (echo "âœ— llms-full.txt audit section missing" && exit 1)
          grep -q "SECURITY AUDIT: com.example.database.DatabaseConnector" CONVENTIONS.md && echo "✓ Aider conventions audit section exists" || (echo "✗ Aider conventions audit section missing" && exit 1)
          echo "All @AIAudit content verified âœ“"

      - name: Upload coverage to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: true

  load-tests:
    name: Load Tests (JDK 21)
    runs-on: ubuntu-latest
    needs: build-maven

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install VibeTags processor
        run: |
          cd vibetags
          mvn install -DskipTests -B

      - name: Run annotation-volume stress test (N â‰¤ 500) and concurrent-build test
        run: |
          cd load-tests
          mvn test -B \
            -Dtest="AnnotationVolumeStressTest,ConcurrentBuildTest" \
            -Dstress.max.classes=500

      - name: Upload stress-test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-results-${{ github.run_id }}
          path: load-tests/target/stress-results-*.txt

  build-gradle:
    name: Gradle Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17', '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle
      
      - name: Build VibeTags Library (Gradle)
        run: |
          cd vibetags
          gradle wrapper || echo "Wrapper generation skipped"
          gradle clean build publishToMavenLocal --no-daemon
      
      - name: Reset AI Config Files (Gradle)
        run: |
          cd example
          bash reset-ai-files.sh

      - name: Build Example Project (Gradle)
        run: |
          cd example
          gradle wrapper || echo "Wrapper generation skipped"
          gradle clean build -PcompilerArgs="-Avibetags.log.path=../vibetags.log" --no-daemon
      
      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          gradle test --no-daemon
      
      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          gradle test -Drun.integration.tests=true --no-daemon
      
      - name: Verify Generated AI Config Files
        run: |
          cd example
          echo "Checking generated files exist and contain content..."
          check() {
            local f="$1"
            test -f "$f" || (echo "âœ— $f missing" && exit 1)
            test -s "$f" || (echo "âœ— $f is empty (processor did not write content)" && exit 1)
            echo "âœ“ $f exists and has content"
          }
          check .cursorrules
          check CLAUDE.md
          check .aiexclude
          check AGENTS.md
          check QWEN.md
          check gemini_instructions.md
          check .github/copilot-instructions.md
          check llms.txt
          check llms-full.txt
          check .codex/config.toml
          check .codex/rules/vibetags.rules
          check CONVENTIONS.md
          check .aiderignore
          check .cursor/rules/com-example-payment-PaymentProcessor.mdc
          check .cursor/rules/com-example-database-DatabaseConnector.mdc
          check .trae/rules/com-example-payment-PaymentProcessor.md
          check .roo/rules/com-example-payment-PaymentProcessor.md
          echo "All generated files present and non-empty âœ“"

      - name: Verify @AIAudit Content
        run: |
          cd example
          echo "Checking @AIAudit content in generated files..."
          grep -q "MANDATORY SECURITY AUDITS" .cursorrules && echo "âœ“ Cursor audit section exists" || (echo "âœ— Cursor audit section missing" && exit 1)
          grep -q "audit_requirements" CLAUDE.md && echo "âœ“ Claude audit requirements exist" || (echo "âœ— Claude audit requirements missing" && exit 1)
          grep -q "CONTINUOUS AUDIT REQUIREMENTS" gemini_instructions.md && echo "âœ“ Gemini audit requirements exist" || (echo "âœ— Gemini audit requirements missing" && exit 1)
          grep -q "MANDATORY SECURITY AUDITS" AGENTS.md && echo "âœ“ Codex audit guardrails exist" || (echo "âœ— Codex audit guardrails missing" && exit 1)
          grep -q "MANDATORY SECURITY AUDITS" QWEN.md && echo "âœ“ Qwen audit guardrails exist" || (echo "âœ— Qwen audit guardrails missing" && exit 1)
          grep -q "Security Audit Requirements" .github/copilot-instructions.md && echo "âœ“ Copilot audit requirements exist" || (echo "âœ— Copilot audit requirements missing" && exit 1)
          grep -q "Security Audit Requirements" llms.txt && echo "âœ“ llms.txt audit section exists" || (echo "âœ— llms.txt audit section missing" && exit 1)
          grep -q "Mandatory Security Audit Requirements" llms-full.txt && echo "âœ“ llms-full.txt audit section exists" || (echo "âœ— llms-full.txt audit section missing" && exit 1)
          grep -q "SECURITY AUDIT: com.example.database.DatabaseConnector" CONVENTIONS.md && echo "✓ Aider conventions audit section exists" || (echo "✗ Aider conventions audit section missing" && exit 1)
          echo "All @AIAudit content verified âœ“"

      - name: Upload coverage to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests-gradle
          fail_ci_if_error: true
