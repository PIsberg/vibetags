name: Build and Test

on:
  push:
    branches: [ main, master, 'feature/*', 'fix/*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-maven:
    name: Maven Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17', '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      
      - name: Build VibeTags Library (Maven)
        run: |
          cd vibetags
          mvn clean install -B
      
      - name: Build Example Project (Maven)
        run: |
          cd example
          mvn clean compile -B -Dvibetags.log.path=../vibetags.log
      
      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          mvn test -B
      
      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          mvn test -Drun.integration.tests=true -B
      
      - name: Verify Generated AI Config Files
        run: |
          cd example
          echo "Checking generated files exist..."
          test -f .cursorrules && echo "✓ .cursorrules exists" || (echo "✗ .cursorrules missing" && exit 1)
          test -f CLAUDE.md && echo "✓ CLAUDE.md exists" || (echo "✗ CLAUDE.md missing" && exit 1)
          test -f .aiexclude && echo "✓ .aiexclude exists" || (echo "✗ .aiexclude missing" && exit 1)
          test -f AGENTS.md && echo "✓ AGENTS.md exists" || (echo "✗ AGENTS.md missing" && exit 1)
          test -f .codex/config.toml && echo "✓ .codex/config.toml exists" || (echo "✗ .codex/config.toml missing" && exit 1)
          test -f .codex/rules/vibetags.rules && echo "✓ .codex/rules/vibetags.rules exists" || (echo "✗ .codex/rules/vibetags.rules missing" && exit 1)
          test -f gemini_instructions.md && echo "✓ gemini_instructions.md exists" || (echo "✗ gemini_instructions.md missing" && exit 1)
          echo "All generated files present ✓"
      
      - name: Verify @AIAudit Content
        run: |
          cd example
          echo "Checking @AIAudit content in generated files..."
          grep -q "MANDATORY SECURITY AUDITS" .cursorrules && echo "✓ Cursor audit section exists" || (echo "✗ Cursor audit section missing" && exit 1)
          grep -q "audit_requirements" CLAUDE.md && echo "✓ Claude audit requirements exist" || (echo "✗ Claude audit requirements missing" && exit 1)
          grep -q "CONTINUOUS AUDIT REQUIREMENTS" gemini_instructions.md && echo "✓ Gemini audit requirements exist" || (echo "✗ Gemini audit requirements missing" && exit 1)
          grep -q "MANDATORY SECURITY AUDITS" AGENTS.md && echo "✓ Codex audit guardrails exist" || (echo "✗ Codex audit guardrails missing" && exit 1)
          echo "All @AIAudit content verified ✓"

      - name: Upload coverage to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: true

  load-tests:
    name: Load Tests (JDK 21)
    runs-on: ubuntu-latest
    needs: build-maven

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install VibeTags processor
        run: |
          cd vibetags
          mvn install -DskipTests -B

      - name: Run annotation-volume stress test (N ≤ 500) and concurrent-build test
        run: |
          cd load-tests
          mvn test -B \
            -Dtest="AnnotationVolumeStressTest,ConcurrentBuildTest" \
            -Dstress.max.classes=500

      - name: Upload stress-test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stress-results-${{ github.run_id }}
          path: load-tests/target/stress-results-*.txt

  build-gradle:
    name: Gradle Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17', '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle
      
      - name: Build VibeTags Library (Gradle)
        run: |
          cd vibetags
          gradle wrapper || echo "Wrapper generation skipped"
          gradle clean build publishToMavenLocal --no-daemon
      
      - name: Build Example Project (Gradle)
        run: |
          cd example
          gradle wrapper || echo "Wrapper generation skipped"
          gradle clean build -PcompilerArgs="-Avibetags.log.path=../vibetags.log" --no-daemon
      
      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          gradle test --no-daemon
      
      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          gradle test -Drun.integration.tests=true --no-daemon
      
      - name: Verify Generated AI Config Files
        run: |
          cd example
          echo "Checking generated files exist..."
          test -f .cursorrules && echo "✓ .cursorrules exists" || (echo "✗ .cursorrules missing" && exit 1)
          test -f CLAUDE.md && echo "✓ CLAUDE.md exists" || (echo "✗ CLAUDE.md missing" && exit 1)
          test -f .aiexclude && echo "✓ .aiexclude exists" || (echo "✗ .aiexclude missing" && exit 1)
          test -f AGENTS.md && echo "✓ AGENTS.md exists" || (echo "✗ AGENTS.md missing" && exit 1)
          test -f .codex/config.toml && echo "✓ .codex/config.toml exists" || (echo "✗ .codex/config.toml missing" && exit 1)
          test -f .codex/rules/vibetags.rules && echo "✓ .codex/rules/vibetags.rules exists" || (echo "✗ .codex/rules/vibetags.rules missing" && exit 1)
          test -f gemini_instructions.md && echo "✓ gemini_instructions.md exists" || (echo "✗ gemini_instructions.md missing" && exit 1)
          echo "All generated files present ✓"
      
      - name: Verify @AIAudit Content
        run: |
          cd example
          echo "Checking @AIAudit content in generated files..."
          grep -q "MANDATORY SECURITY AUDITS" .cursorrules && echo "✓ Cursor audit section exists" || (echo "✗ Cursor audit section missing" && exit 1)
          grep -q "audit_requirements" CLAUDE.md && echo "✓ Claude audit requirements exist" || (echo "✗ Claude audit requirements missing" && exit 1)
          grep -q "CONTINUOUS AUDIT REQUIREMENTS" gemini_instructions.md && echo "✓ Gemini audit requirements exist" || (echo "✗ Gemini audit requirements missing" && exit 1)
          grep -q "MANDATORY SECURITY AUDITS" AGENTS.md && echo "✓ Codex audit guardrails exist" || (echo "✗ Codex audit guardrails missing" && exit 1)
          echo "All @AIAudit content verified ✓"

      - name: Upload coverage to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests-gradle
          fail_ci_if_error: true
