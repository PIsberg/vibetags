name: Build and Test

on:
  push:
    branches: [ main, master, 'feature/*', 'fix/*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-maven:
    name: Maven Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17', '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      
      - name: Install VibeTags Annotations (Maven)
        run: |
          cd vibetags-annotations
          mvn install -B

      - name: Build VibeTags Library (Maven)
        run: |
          cd vibetags
          mvn clean install -B

      - name: Install VibeTags BOM (Maven)
        run: |
          cd vibetags-bom
          mvn install -B

      - name: Reset AI Config Files (Maven)
        run: |
          cd example
          bash reset-ai-files.sh

      - name: Build Example Project (Maven)
        run: |
          cd example
          mvn clean compile -B -Dvibetags.log.path=../vibetags.log

      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          mvn test -B
      
      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          mvn test -Drun.integration.tests=true -B
      
      - name: Verify Generated AI Config Files
        run: |
          cd example
          echo "Checking generated files exist and contain content..."
          for f in \
            .cursorrules CLAUDE.md .aiexclude AGENTS.md QWEN.md .qwenignore \
            .qwen/settings.json .qwen/commands/refactor.md gemini_instructions.md \
            .github/copilot-instructions.md llms.txt llms-full.txt \
            .codex/config.toml .codex/rules/vibetags.rules CONVENTIONS.md .aiderignore \
            .windsurfrules .rules .cody/config.json .codyignore .supermavenignore \
            .cursor/rules/com-example-payment-PaymentProcessor.mdc \
            .cursor/rules/com-example-database-DatabaseConnector.mdc \
            .trae/rules/com-example-payment-PaymentProcessor.md \
            .roo/rules/com-example-payment-PaymentProcessor.md \
            .windsurf/rules/com-example-payment-PaymentProcessor.md \
            .continue/rules/com-example-payment-PaymentProcessor.md \
            .tabnine/guidelines/com-example-payment-PaymentProcessor.md \
            .amazonq/rules/com-example-payment-PaymentProcessor.md \
            .ai/rules/com-example-payment-PaymentProcessor.md \
            .pearai/rules/com-example-payment-PaymentProcessor.md \
            .mentatconfig.json sweep.yaml .plandex.yaml \
            .doubleignore .interpreter/profiles/vibetags.yaml .codeiumignore; do
            if [ ! -f "$f" ]; then echo "FAIL $f missing"; exit 1; fi
            if [ ! -s "$f" ]; then echo "FAIL $f empty"; exit 1; fi
            echo "OK $f"
          done
          echo "All generated files present and non-empty"

      - name: Verify @AIAudit Content
        run: |
          cd example
          echo "Checking @AIAudit content in generated files..."
          grep -q "MANDATORY SECURITY AUDITS" .cursorrules || { echo "FAIL Cursor audit section missing"; exit 1; }
          echo "OK Cursor audit section"
          grep -q "audit_requirements" CLAUDE.md || { echo "FAIL Claude audit requirements missing"; exit 1; }
          echo "OK Claude audit requirements"
          grep -q "CONTINUOUS AUDIT REQUIREMENTS" gemini_instructions.md || { echo "FAIL Gemini audit requirements missing"; exit 1; }
          echo "OK Gemini audit requirements"
          grep -q "MANDATORY SECURITY AUDITS" AGENTS.md || { echo "FAIL Codex audit guardrails missing"; exit 1; }
          echo "OK Codex audit guardrails"
          grep -q "MANDATORY SECURITY AUDITS" QWEN.md || { echo "FAIL Qwen audit guardrails missing"; exit 1; }
          echo "OK Qwen audit guardrails"
          grep -q "Security Audit Requirements" .github/copilot-instructions.md || { echo "FAIL Copilot audit requirements missing"; exit 1; }
          echo "OK Copilot audit requirements"
          grep -q "Security Audit Requirements" llms.txt || { echo "FAIL llms.txt audit section missing"; exit 1; }
          echo "OK llms.txt audit section"
          grep -q "Mandatory Security Audit Requirements" llms-full.txt || { echo "FAIL llms-full.txt audit section missing"; exit 1; }
          echo "OK llms-full.txt audit section"
          grep -q "SECURITY AUDIT: com.example.database.DatabaseConnector" CONVENTIONS.md || { echo "FAIL Aider conventions audit section missing"; exit 1; }
          echo "OK Aider conventions audit section"
          grep -q "Security audit required" sweep.yaml || { echo "FAIL sweep.yaml audit rule missing"; exit 1; }
          echo "OK sweep.yaml audit rule"
          grep -q '"audit"' .mentatconfig.json || { echo "FAIL .mentatconfig.json audit section missing"; exit 1; }
          echo "OK .mentatconfig.json audit section"
          grep -q "audit:" .plandex.yaml || { echo "FAIL .plandex.yaml audit section missing"; exit 1; }
          echo "OK .plandex.yaml audit section"
          grep -q "audit" .interpreter/profiles/vibetags.yaml || { echo "FAIL interpreter profile audit missing"; exit 1; }
          echo "OK Open Interpreter profile audit"
          echo "All @AIAudit content verified"

      - name: Upload coverage to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: true

  load-tests:
    name: Load Tests (JDK 21)
    runs-on: ubuntu-latest
    needs: build-maven

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install VibeTags annotations
        run: |
          cd vibetags-annotations
          mvn install -B

      - name: Install VibeTags processor
        run: |
          cd vibetags
          mvn install -DskipTests -B

      - name: Run annotation-volume stress test (N â‰¤ 500) and concurrent-build test
        run: |
          cd load-tests
          mvn test -B \
            -Dtest="AnnotationVolumeStressTest,ConcurrentBuildTest" \
            -Dstress.max.classes=500

      - name: Upload stress-test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-results-${{ github.run_id }}
          path: load-tests/target/stress-results-*.txt

  build-gradle:
    name: Gradle Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17', '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle
      
      - name: Publish VibeTags Annotations (Gradle)
        run: |
          cd vibetags-annotations
          gradle wrapper || echo "Wrapper generation skipped"
          gradle clean build publishToMavenLocal --no-daemon

      - name: Build VibeTags Library (Gradle)
        run: |
          cd vibetags
          gradle wrapper || echo "Wrapper generation skipped"
          gradle clean build publishToMavenLocal --no-daemon

      - name: Install VibeTags BOM (Maven, consumed by Gradle via mavenLocal)
        run: |
          cd vibetags-bom
          mvn install -B

      - name: Reset AI Config Files (Gradle)
        run: |
          cd example
          bash reset-ai-files.sh

      - name: Build Example Project (Gradle)
        run: |
          cd example
          gradle wrapper || echo "Wrapper generation skipped"
          gradle clean build -PcompilerArgs="-Avibetags.log.path=../vibetags.log" --no-daemon
      
      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          gradle test --no-daemon
      
      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          gradle test -Drun.integration.tests=true --no-daemon
      
      - name: Verify Generated AI Config Files
        run: |
          cd example
          echo "Checking generated files exist and contain content..."
          for f in \
            .cursorrules CLAUDE.md .aiexclude AGENTS.md QWEN.md .qwenignore \
            .qwen/settings.json .qwen/commands/refactor.md gemini_instructions.md \
            .github/copilot-instructions.md llms.txt llms-full.txt \
            .codex/config.toml .codex/rules/vibetags.rules CONVENTIONS.md .aiderignore \
            .windsurfrules .rules .cody/config.json .codyignore .supermavenignore \
            .cursor/rules/com-example-payment-PaymentProcessor.mdc \
            .cursor/rules/com-example-database-DatabaseConnector.mdc \
            .trae/rules/com-example-payment-PaymentProcessor.md \
            .roo/rules/com-example-payment-PaymentProcessor.md \
            .windsurf/rules/com-example-payment-PaymentProcessor.md \
            .continue/rules/com-example-payment-PaymentProcessor.md \
            .tabnine/guidelines/com-example-payment-PaymentProcessor.md \
            .amazonq/rules/com-example-payment-PaymentProcessor.md \
            .ai/rules/com-example-payment-PaymentProcessor.md \
            .pearai/rules/com-example-payment-PaymentProcessor.md \
            .mentatconfig.json sweep.yaml .plandex.yaml \
            .doubleignore .interpreter/profiles/vibetags.yaml .codeiumignore; do
            if [ ! -f "$f" ]; then echo "FAIL $f missing"; exit 1; fi
            if [ ! -s "$f" ]; then echo "FAIL $f empty"; exit 1; fi
            echo "OK $f"
          done
          echo "All generated files present and non-empty"

      - name: Verify @AIAudit Content
        run: |
          cd example
          echo "Checking @AIAudit content in generated files..."
          grep -q "MANDATORY SECURITY AUDITS" .cursorrules || { echo "FAIL Cursor audit section missing"; exit 1; }
          echo "OK Cursor audit section"
          grep -q "audit_requirements" CLAUDE.md || { echo "FAIL Claude audit requirements missing"; exit 1; }
          echo "OK Claude audit requirements"
          grep -q "CONTINUOUS AUDIT REQUIREMENTS" gemini_instructions.md || { echo "FAIL Gemini audit requirements missing"; exit 1; }
          echo "OK Gemini audit requirements"
          grep -q "MANDATORY SECURITY AUDITS" AGENTS.md || { echo "FAIL Codex audit guardrails missing"; exit 1; }
          echo "OK Codex audit guardrails"
          grep -q "MANDATORY SECURITY AUDITS" QWEN.md || { echo "FAIL Qwen audit guardrails missing"; exit 1; }
          echo "OK Qwen audit guardrails"
          grep -q "Security Audit Requirements" .github/copilot-instructions.md || { echo "FAIL Copilot audit requirements missing"; exit 1; }
          echo "OK Copilot audit requirements"
          grep -q "Security Audit Requirements" llms.txt || { echo "FAIL llms.txt audit section missing"; exit 1; }
          echo "OK llms.txt audit section"
          grep -q "Mandatory Security Audit Requirements" llms-full.txt || { echo "FAIL llms-full.txt audit section missing"; exit 1; }
          echo "OK llms-full.txt audit section"
          grep -q "SECURITY AUDIT: com.example.database.DatabaseConnector" CONVENTIONS.md || { echo "FAIL Aider conventions audit section missing"; exit 1; }
          echo "OK Aider conventions audit section"
          grep -q "Security audit required" sweep.yaml || { echo "FAIL sweep.yaml audit rule missing"; exit 1; }
          echo "OK sweep.yaml audit rule"
          grep -q '"audit"' .mentatconfig.json || { echo "FAIL .mentatconfig.json audit section missing"; exit 1; }
          echo "OK .mentatconfig.json audit section"
          grep -q "audit:" .plandex.yaml || { echo "FAIL .plandex.yaml audit section missing"; exit 1; }
          echo "OK .plandex.yaml audit section"
          grep -q "audit" .interpreter/profiles/vibetags.yaml || { echo "FAIL interpreter profile audit missing"; exit 1; }
          echo "OK Open Interpreter profile audit"
          echo "All @AIAudit content verified"

      - name: Upload coverage to Codecov
        if: matrix.java == '17'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests-gradle
          fail_ci_if_error: true
