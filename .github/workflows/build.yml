name: Build and Test

on:
  push:
    branches: [ main, master, 'feature/*', 'fix/*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-maven:
    name: Maven Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven
      
      - name: Install async-test-lib (required for concurrency tests, not on Maven Central)
        run: |
          git clone --depth 1 --branch v1.6.0 https://github.com/PIsberg/async-test-lib.git /tmp/async-test-lib
          cd /tmp/async-test-lib
          JAVA_HOME=$JAVA_HOME_21_X64 mvn install -DskipTests -B -q

      - name: Install VibeTags Annotations (Maven)
        run: |
          cd vibetags-annotations
          mvn install -B

      - name: Build VibeTags Library (Maven)
        # PMD, SpotBugs and CPD are JDK-independent source/bytecode analysis, so run them
        # once (on JDK 21) instead of repeating identical work on every matrix JDK. Error Prone
        # stays on every JDK — it is a compiler plugin and is genuinely JDK-sensitive (see the
        # JDK 26 UnsafeFinalization workaround in vibetags/pom.xml). -Dmaven.pmd.skip also skips CPD.
        run: |
          cd vibetags
          if [ "${{ matrix.java }}" = "21" ]; then
            mvn clean install -B
          else
            mvn clean install -B -Dmaven.pmd.skip=true -Dspotbugs.skip=true
          fi

      - name: Install VibeTags BOM (Maven)
        run: |
          cd vibetags-bom
          mvn install -B

      - name: Reset AI Config Files (Maven)
        run: |
          cd example
          bash reset-ai-files.sh

      - name: Build Example Project (Maven)
        run: |
          cd example
          mvn clean compile -B -Dvibetags.log.path=../vibetags.log

      - name: Build Multi-Module Example (Maven reactor)
        run: |
          cd example-multimodule
          mvn clean verify -B

      - name: Verify Multi-Module Aggregation (issue #278)
        run: |
          cd example-multimodule
          for token in "VIBETAGS-MODULE: core" "VIBETAGS-MODULE: engine" "VIBETAGS-MODULE: cli" \
                       "com.example.multimodule.core.IrNode" \
                       "com.example.multimodule.engine.LayoutEngine" \
                       "com.example.multimodule.cli.MultiModuleCli"; do
            grep -qF "$token" CLAUDE.md || { echo "MISSING in CLAUDE.md: $token"; exit 1; }
            grep -qF "$token" .cursorrules || { echo "MISSING in .cursorrules: $token"; exit 1; }
          done
          echo "All reactor modules present in merged guardrail files."

      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          mvn test -B
      
      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          mvn test -Drun.integration.tests=true -B
      
      - name: Verify Generated AI Config Files
        uses: ./.github/actions/verify-generated-files
        with:
          working-directory: example

      - name: Upload coverage to Codecov
        if: matrix.java == '21'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/target/site/jacoco/jacoco.xml
          flags: unittests
          fail_ci_if_error: false

  cross-platform:
    name: Cross-Platform Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest ]
    # Path separators, line endings (CRLF) and the marker-aware writer are
    # OS-sensitive; the main matrix only runs on Linux. This job runs the
    # library's unit tests (self-contained, temp-dir based) on Windows and
    # macOS to catch platform-specific regressions in file handling.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install async-test-lib (required for concurrency tests, not on Maven Central)
        run: |
          git clone --depth 1 --branch v1.6.0 https://github.com/PIsberg/async-test-lib.git "${RUNNER_TEMP}/async-test-lib"
          cd "${RUNNER_TEMP}/async-test-lib"
          mvn install -DskipTests -B -q

      - name: Install VibeTags Annotations (Maven)
        run: |
          cd vibetags-annotations
          mvn install -B -q

      - name: Build VibeTags Library (Maven)
        run: |
          cd vibetags
          mvn clean install -B -q

      - name: Install VibeTags BOM (Maven)
        run: |
          cd vibetags-bom
          mvn install -B -q

      - name: Reset AI Config Files (Maven)
        run: |
          cd example
          bash reset-ai-files.sh

      - name: Build Example Project (Maven)
        run: |
          cd example
          mvn -B clean compile

      - name: Build Multi-Module Example (Maven reactor)
        run: |
          cd example-multimodule
          mvn clean verify -B
          grep -qF "VIBETAGS-MODULE: core" CLAUDE.md
          grep -qF "VIBETAGS-MODULE: engine" CLAUDE.md
          grep -qF "VIBETAGS-MODULE: cli" CLAUDE.md

      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          mvn test -B

      - name: Verify Generated AI Config Files
        uses: ./.github/actions/verify-generated-files
        with:
          working-directory: example

  load-tests:
    name: Load Tests (JDK 21)
    runs-on: ubuntu-latest
    needs: build-maven

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install VibeTags annotations
        run: |
          cd vibetags-annotations
          mvn install -B

      - name: Install VibeTags processor
        run: |
          cd vibetags
          mvn install -DskipTests -B

      - name: Run annotation-volume stress test (N â‰¤ 500) and concurrent-build test
        run: |
          cd load-tests
          mvn test -B \
            -Dtest="AnnotationVolumeStressTest,ConcurrentBuildTest" \
            -Dstress.max.classes=500

      - name: Upload stress-test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-results-${{ github.run_id }}
          path: load-tests/target/stress-results-*.txt

  build-gradle:
    name: Gradle Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21', '25', '26' ]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle
      
      - name: Install async-test-lib (required for concurrency tests, not on Maven Central)
        run: |
          git clone --depth 1 --branch v1.6.0 https://github.com/PIsberg/async-test-lib.git /tmp/async-test-lib
          cd /tmp/async-test-lib
          JAVA_HOME=$JAVA_HOME_21_X64 mvn install -DskipTests -B -q

      - name: Publish VibeTags Annotations (Gradle)
        run: |
          cd vibetags-annotations
          ./gradlew clean build publishToMavenLocal --no-daemon

      - name: Build VibeTags Library (Gradle)
        run: |
          cd vibetags
          ./gradlew clean build publishToMavenLocal --no-daemon

      - name: Install VibeTags BOM (Maven, consumed by Gradle via mavenLocal)
        run: |
          cd vibetags-bom
          mvn install -B

      - name: Reset AI Config Files (Gradle)
        run: |
          cd example
          bash reset-ai-files.sh

      - name: Build Example Project (Gradle)
        run: |
          cd example
          ./gradlew clean build -PcompilerArgs="-Avibetags.log.path=../vibetags.log" --no-daemon

      - name: Run Unit Tests (VibeTags Library)
        run: |
          cd vibetags
          ./gradlew test --no-daemon

      - name: Run Integration Tests (requires compiled example)
        run: |
          cd vibetags
          ./gradlew test -Drun.integration.tests=true --no-daemon
      
      - name: Verify Generated AI Config Files
        uses: ./.github/actions/verify-generated-files
        with:
          working-directory: example

      - name: Upload coverage to Codecov
        if: matrix.java == '21'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: vibetags/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests-gradle
          fail_ci_if_error: false

  mutation-testing:
    name: Mutation Testing (PIT)
    runs-on: ubuntu-latest
    needs: build-maven
    continue-on-error: true

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install async-test-lib (required for concurrency tests, not on Maven Central)
        run: |
          git clone --depth 1 --branch v1.6.0 https://github.com/PIsberg/async-test-lib.git /tmp/async-test-lib
          cd /tmp/async-test-lib
          mvn install -DskipTests -B -q

      - name: Install VibeTags Annotations (Maven)
        run: |
          cd vibetags-annotations
          mvn install -B

      - name: Run Mutation Coverage (PIT)
        run: |
          cd vibetags
          mvn -B -Pmutation test-compile org.pitest:pitest-maven:mutationCoverage

      - name: Upload PIT mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pitest-report-${{ github.run_id }}
          path: vibetags/target/pit-reports/**
          if-no-files-found: warn
