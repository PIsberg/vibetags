name: Generate Demo GIF

on:
  push:
    branches: [ main ]
    paths:
      - 'vibetags-annotations/src/**'
      - 'vibetags/src/**'
      - 'tools/demo/**'
      - 'tools/demo-commands.sh'
      - '.github/workflows/demo.yml'
  workflow_dispatch:

# Least privilege at the top level; the commit/PR job opts into the writes it needs.
permissions:
  contents: read

jobs:
  generate-demo:
    name: Record demo and convert to GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the GIF branch
      pull-requests: write    # open the update PR

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install asciinema
        run: sudo apt-get install -y asciinema

      - name: Install agg
        run: |
          curl -fsSL "https://github.com/asciinema/agg/releases/latest/download/agg-x86_64-unknown-linux-gnu" \
            -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg

      - name: Build VibeTags (annotations → processor → BOM)
        run: |
          cd vibetags-annotations && mvn install -q -B
          cd ../vibetags         && mvn install -q -B
          cd ../vibetags-bom     && mvn install -q -B

      - name: Pre-download demo project dependencies
        working-directory: tools/demo
        run: mvn dependency:resolve -q -B

      - name: Reset placeholder files to empty
        working-directory: tools/demo
        run: |
          : > CLAUDE.md
          : > .cursorrules
          : > AGENTS.md

      - name: Record demo session
        working-directory: tools/demo
        env:
          # asciinema needs a home dir for config
          HOME: /root
        run: |
          chmod +x ../demo-commands.sh
          asciinema rec ../../docs/vibetags-demo.cast \
            --command "bash ../demo-commands.sh" \
            --cols 82 --rows 26 \
            --overwrite

      - name: Convert cast to GIF
        run: |
          agg docs/vibetags-demo.cast docs/demo.gif \
            --font-size 14 \
            --speed 1.2 \
            --idle-time-limit 3

      - name: Commit GIF via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo.gif docs/vibetags-demo.cast
          if git diff --staged --quiet; then
            echo "GIF unchanged — nothing to commit."
            exit 0
          fi
          BRANCH="chore/update-demo-gif-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: regenerate demo GIF"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: regenerate demo GIF" \
            --body "Auto-generated by the [demo workflow](../actions/workflows/demo.yml). Merges the updated \`docs/demo.gif\` and \`docs/vibetags-demo.cast\`." \
            --label "documentation" || true
