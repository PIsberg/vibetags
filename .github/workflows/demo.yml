name: Generate Demo GIF

on:
  push:
    branches: [ main ]
    paths:
      - 'vibetags-annotations/src/**'
      - 'vibetags/src/**'
      - 'tools/demo/**'
      - 'tools/demo-commands.sh'
      - '.github/workflows/demo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-demo:
    name: Record demo and convert to GIF
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install asciinema
        run: sudo apt-get install -y asciinema

      - name: Install agg
        run: |
          curl -fsSL "https://github.com/asciinema/agg/releases/latest/download/agg-x86_64-unknown-linux-gnu" \
            -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg

      - name: Build VibeTags (annotations → processor → BOM)
        run: |
          cd vibetags-annotations && mvn install -q -B
          cd ../vibetags         && mvn install -q -B
          cd ../vibetags-bom     && mvn install -q -B

      - name: Pre-download demo project dependencies
        working-directory: tools/demo
        run: mvn dependency:resolve -q -B

      - name: Reset placeholder files to empty
        working-directory: tools/demo
        run: |
          : > CLAUDE.md
          : > .cursorrules
          : > AGENTS.md

      - name: Record demo session
        working-directory: tools/demo
        env:
          # asciinema needs a home dir for config
          HOME: /root
        run: |
          chmod +x ../demo-commands.sh
          asciinema rec ../../docs/vibetags-demo.cast \
            --command "bash ../demo-commands.sh" \
            --cols 82 --rows 26 \
            --overwrite

      - name: Convert cast to GIF
        run: |
          agg docs/vibetags-demo.cast docs/demo.gif \
            --font-size 14 \
            --speed 1.2 \
            --idle-time-limit 3

      - name: Commit GIF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo.gif docs/vibetags-demo.cast
          if ! git diff --staged --quiet; then
            git commit -m "chore: regenerate demo GIF [skip ci]"
            git push
          fi
