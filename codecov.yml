codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 90%
        threshold: 2%
    patch:
      default:
        # @SuppressWarnings annotations have RetentionPolicy.SOURCE — they are
        # stripped from bytecode so JaCoCo never records coverage for those lines.
        # On PMD-suppression commits every @SuppressWarnings in the diff counts as
        # an uncovered line, making patch coverage misleading. Keep patch coverage
        # as informational (reported but non-blocking); project-level target still
        # enforces the 90% floor on overall coverage.
        informational: true

ignore:
  - "vibetags-bom/"
  - "example/"
  - "load-tests/"
