plugins {
    id 'java'
}

group = 'se.deversity.vibetags.example'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    // VibeTags Annotation Processor
    compileOnly 'se.deversity.vibetags:vibetags-processor:1.0.0-SNAPSHOT'
    annotationProcessor 'se.deversity.vibetags:vibetags-processor:1.0.0-SNAPSHOT'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

compileJava {
    options.annotationProcessorPath = configurations.annotationProcessor
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.example.MainApplication'
        )
    }
}

// Optional: Run the application
task runApp(type: JavaExec) {
    group = 'application'
    description = 'Run the VibeTags example application'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.example.MainApplication'
}
