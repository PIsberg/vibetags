plugins {
    id 'java-library'
    id 'maven-publish'
    id 'jacoco'
}

group = 'se.deversity.vibetags'
version = '1.0.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
    withSourcesJar()
    withJavadocJar()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = 'se.deversity.vibetags'
            artifactId = 'vibetags-processor'
            version = '1.0.0-SNAPSHOT'
            from components.java

            pom {
                name = 'VibeTags Processor'
                description = 'Java annotation processor that generates AI platform-specific guardrail configuration files at compile time.'
                url = 'https://github.com/PIsberg/vibetags'
                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
                developers {
                    developer {
                        id = 'PIsberg'
                        name = 'Peter Isberg'
                        url = 'https://github.com/PIsberg'
                    }
                }
                scm {
                    connection = 'scm:git:git://github.com/PIsberg/vibetags.git'
                    developerConnection = 'scm:git:ssh://github.com/PIsberg/vibetags.git'
                    url = 'https://github.com/PIsberg/vibetags/tree/main'
                }
            }
        }
    }

    repositories {
        // GitHub Packages
        maven {
            name = 'GitHubPackages'
            url = uri('https://maven.pkg.github.com/PIsberg/vibetags')
            credentials {
                username = System.getenv('GITHUB_ACTOR')
                password = System.getenv('GITHUB_TOKEN')
            }
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.11.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(JavaCompile) {
    // Disable annotation processing when compiling the processor itself
    options.compilerArgs += ['-proc:none']
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
    }
}
